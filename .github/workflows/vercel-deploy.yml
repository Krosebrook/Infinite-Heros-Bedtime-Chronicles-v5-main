name: Vercel Deploy Hook

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger-vercel-deploy:
    name: Trigger Vercel Deployment
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_myNZG165UNikhCELMHP8gsTLCnf4/LzEiHWlfqI"
      
      - name: Notify deployment triggered
        run: echo "✅ Vercel deployment triggered successfully"

      - name: Wait for deployment and health check
        run: |
          echo "⏳ Waiting 60 seconds for deployment to complete..."
          sleep 60
          echo "🔍 Running health check..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://bedtime-chronicles.com/api/health || echo "000")
          echo "Health check status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check passed"
          else
            echo "⚠️ Health check returned status $STATUS — deployment may still be in progress"
          fi
