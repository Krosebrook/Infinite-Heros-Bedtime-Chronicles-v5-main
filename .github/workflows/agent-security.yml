name: Agent - Security

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: agent-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-agent:
    name: Security Agent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security agent
        run: node agents/security/index.js --output agents/security/security-report.json

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-agent-report
          path: agents/security/security-report.json
          retention-days: 14

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    # The analyze step calls the Actions API (run telemetry + scanning the
    # workflow files themselves), which requires actions:read. A job-level
    # permissions block overrides the workflow default and sets every unlisted
    # scope to none, so the scopes CodeQL needs are restated here explicitly.
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        # continue-on-error: the upload fails with "Code scanning is not enabled"
        # until the repo owner enables it in Settings → Security → Code scanning.
        # Step-level continue-on-error lets the job succeed so it doesn't gate
        # merges on a repo-settings gap outside this repo's code.
        continue-on-error: true
        uses: github/codeql-action/analyze@v4
