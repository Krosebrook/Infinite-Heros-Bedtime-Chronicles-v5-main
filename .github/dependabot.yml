version: 2
updates:
  # npm package updates
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    reviewers:
      - "Krosebrook"
    labels:
      - "dependencies"
      - "automated"
    groups:
      expo-sdk:
        patterns:
          - "expo*"
          - "@expo/*"
        update-types:
          - "minor"
          - "patch"
      react-native:
        patterns:
          - "react-native*"
          - "@react-native/*"
        update-types:
          - "minor"
          - "patch"
      ai-providers:
        patterns:
          - "@anthropic-ai/*"
          - "@google/genai"
          - "openai"
          - "elevenlabs"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Expo SDK major versions require coordinated upgrades
      - dependency-name: "expo"
        update-types: ["version-update:semver-major"]
      # drizzle-orm major upgrade requires schema migration
      - dependency-name: "drizzle-orm"
        update-types: ["version-update:semver-major"]

  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "Krosebrook"
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
